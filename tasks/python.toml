# Python development, build, lint, and format tasks

["python:dev"]
description = "Install Python package in development mode (builds CLI binary)"
depends = ["python:proto"]
run = "uv sync --group dev && uv pip install ."
hide = true

["build:python:wheel"]
description = "Build Python wheel with CLI binary (native)"
depends = ["python:proto"]
run = "uv run maturin build --release"
hide = true

["python:build"]
description = "Alias for build:python:wheel"
depends = ["build:python:wheel"]
hide = true

["build:python:wheel:macos"]
description = "Build Python wheel for macOS arm64"
depends = ["python:proto"]
run = """
#!/usr/bin/env bash
set -euo pipefail

# Avoid failures when RUSTC_WRAPPER is set to an unresolved `sccache` binary.
if command -v sccache >/dev/null 2>&1; then
  export RUSTC_WRAPPER="$(command -v sccache)"
else
  unset RUSTC_WRAPPER || true
fi

mkdir -p target/wheels

rustup target add aarch64-apple-darwin

uv run maturin build --release --target aarch64-apple-darwin --out target/wheels

ls -la target/wheels/*.whl
"""
hide = true

["python:build:macos"]
description = "Alias for build:python:wheel:macos"
depends = ["build:python:wheel:macos"]
hide = true

["build:python:wheel:all"]
description = "Build Python wheels for macOS"
depends = ["build:python:wheel", "build:python:wheel:macos"]
hide = true

["python:build:all"]
description = "Alias for build:python:wheel:all"
depends = ["build:python:wheel:all"]
hide = true

["python:lint"]
description = "Lint Python code with ruff"
depends = ["python:proto"]
env = { UV_NO_SYNC = "1" }
run = "uv run ruff check {{vars.python_paths}}"
hide = true

["python:format"]
description = "Format Python code with ruff"
run = "uv run ruff format {{vars.python_paths}}"
hide = true

["python:format:check"]
description = "Check Python formatting with ruff"
run = "uv run ruff format --check {{vars.python_paths}}"
hide = true

["python:typecheck"]
description = "Type check Python code with ty"
depends = ["python:proto"]
run = "uv run ty check {{vars.python_paths}}"
hide = true

["python:publish"]
description = "Build and publish Python wheels"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION=$(uv run python tasks/scripts/release.py get-version --python)
CARGO_VERSION=$(uv run python tasks/scripts/release.py get-version --cargo)
OPENSHELL_CARGO_VERSION="$CARGO_VERSION" mise run build:python:wheel:all
uv run python tasks/scripts/release.py python-publish --version "$VERSION"
"""
hide = true

["python:publish:macos"]
description = "Build and publish macOS arm64 Python wheel"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION=$(uv run python tasks/scripts/release.py get-version --python)
CARGO_VERSION=$(uv run python tasks/scripts/release.py get-version --cargo)
OPENSHELL_CARGO_VERSION="$CARGO_VERSION" mise run python:build:macos
uv run python tasks/scripts/release.py python-publish --version "$VERSION" --wheel-glob "*macosx*arm64.whl"
"""
hide = true

["python:proto"]
description = "Generate Python protobuf stubs from .proto files"
env = { UV_NO_SYNC = "1" }
run = """
#!/usr/bin/env bash
set -euo pipefail
uv run python -m grpc_tools.protoc \
  -Iproto \
  --python_out=python/openshell/_proto \
  --pyi_out=python/openshell/_proto \
  --grpc_python_out=python/openshell/_proto \
  proto/inference.proto \
  proto/openshell.proto \
  proto/datamodel.proto \
  proto/sandbox.proto
# Fix absolute imports in generated stubs to use package-relative imports
uv run python - <<'PY'
from pathlib import Path
import re

line_rewrites = {
    "python/openshell/_proto/inference_pb2_grpc.py": [
        (r"^import inference_pb2 as inference__pb2$", "from . import inference_pb2 as inference__pb2"),
    ],
    "python/openshell/_proto/openshell_pb2_grpc.py": [
        (r"^import openshell_pb2 as openshell__pb2$", "from . import openshell_pb2 as openshell__pb2"),
        (r"^import sandbox_pb2 as sandbox__pb2$", "from . import sandbox_pb2 as sandbox__pb2"),
    ],
    "python/openshell/_proto/openshell_pb2.py": [
        (r"^import datamodel_pb2 as datamodel__pb2$", "from . import datamodel_pb2 as datamodel__pb2"),
        (r"^import sandbox_pb2 as sandbox__pb2$", "from . import sandbox_pb2 as sandbox__pb2"),
    ],
    "python/openshell/_proto/datamodel_pb2.py": [
        (r"^import sandbox_pb2 as sandbox__pb2$", "from . import sandbox_pb2 as sandbox__pb2"),
    ],
    "python/openshell/_proto/datamodel_pb2_grpc.py": [
        (r"^import datamodel_pb2 as datamodel__pb2$", "from . import datamodel_pb2 as datamodel__pb2"),
    ],
    "python/openshell/_proto/sandbox_pb2_grpc.py": [
        (r"^import sandbox_pb2 as sandbox__pb2$", "from . import sandbox_pb2 as sandbox__pb2"),
    ],
}

for path, rules in line_rewrites.items():
    file_path = Path(path)
    text = file_path.read_text()
    text = text.replace("from . from . import", "from . import")
    for pattern, replacement in rules:
        text = re.sub(pattern, replacement, text, flags=re.MULTILINE)
    file_path.write_text(text)
PY
"""
hide = true
