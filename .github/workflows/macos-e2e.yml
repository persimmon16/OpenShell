# macOS E2E tests using Apple Container.
#
# Validates the Apple Container runtime path on macOS runners. This
# workflow is separate from the Linux-based e2e-test.yml which uses Docker.

name: macOS E2E

on:
  pull_request:
    paths:
      - "crates/openshell-bootstrap/**"
      - "crates/openshell-server/**"
      - "crates/openshell-cli/**"
      - "container-bridge/**"
      - "deploy/container/**"
      - "proto/container_bridge.proto"
  workflow_dispatch:

jobs:
  macos-e2e:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install Apple Container
        env:
          CONTAINER_VERSION: "0.11.0"
        run: |
          curl -fsSL -o container-installer.pkg \
            "https://github.com/apple/container/releases/download/${CONTAINER_VERSION}/container-${CONTAINER_VERSION}-installer-signed.pkg"
          sudo installer -pkg container-installer.pkg -target /
          rm container-installer.pkg

      - name: Verify Apple Container
        run: container system version

      - name: Build CLI
        run: cargo build --release -p openshell-cli

      - name: Clone Apple Container (Swift package dependency)
        run: git clone --depth 1 --branch 0.11.0 https://github.com/apple/container.git container

      - name: Build Swift bridge
        working-directory: container-bridge
        run: swift build -c release

      - name: Start bridge daemon
        working-directory: container-bridge
        run: |
          .build/release/container-bridge --port 50052 &
          sleep 2

      - name: Gateway lifecycle test
        run: |
          ./target/release/openshell gateway start --name test
          ./target/release/openshell sandbox create --name e2e-test
          ./target/release/openshell sandbox list
          ./target/release/openshell sandbox delete e2e-test
          ./target/release/openshell gateway stop --name test

      - name: Cleanup
        if: always()
        run: |
          ./target/release/openshell gateway destroy --name test || true
          killall container-bridge || true
